openapi: 3.0.0
info:
  title: Kanban API
  version: 1.1.0
tags:
  - name: Auth
  - name: Boards
  - name: Columns
  - name: Tasks
  - name: Admin
  - name: Users
paths:
  /api/admin/stats:
    get:
      operationId: Admin_getStats
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatsResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Admin
  /api/admin/users:
    get:
      operationId: Admin_listUsers
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 1
          explode: false
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
          explode: false
        - name: search
          in: query
          required: false
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - totalCount
                  - page
                  - pageSize
                  - totalPages
                  - hasNextPage
                  - hasPreviousPage
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminUserListItem'
                  totalCount:
                    type: integer
                    format: int32
                    description: Total number of records matching the query
                  page:
                    type: integer
                    format: int32
                    description: Current page number (1-based)
                  pageSize:
                    type: integer
                    format: int32
                    description: Number of items per page
                  totalPages:
                    type: integer
                    format: int32
                    description: Total number of pages
                  hasNextPage:
                    type: boolean
                    description: Whether there is a next page
                  hasPreviousPage:
                    type: boolean
                    description: Whether there is a previous page
                description: Generic paginated response wrapper
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Admin
  /api/admin/users/{userId}/role:
    patch:
      operationId: Admin_updateUserRole
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListItem'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRoleRequest'
  /api/admin/users/{userId}/status:
    patch:
      operationId: Admin_updateUserStatus
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListItem'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserStatusRequest'
  /api/auth/login:
    post:
      operationId: Auth_login
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
  /api/auth/logout:
    post:
      operationId: Auth_logout
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Auth
  /api/auth/me:
    get:
      operationId: Auth_me
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Auth
    patch:
      operationId: Auth_updateProfile
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
  /api/auth/register:
    post:
      operationId: Auth_register
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
  /api/boards:
    get:
      operationId: Boards_list
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 1
          explode: false
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - totalCount
                  - page
                  - pageSize
                  - totalPages
                  - hasNextPage
                  - hasPreviousPage
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Board'
                  totalCount:
                    type: integer
                    format: int32
                    description: Total number of records matching the query
                  page:
                    type: integer
                    format: int32
                    description: Current page number (1-based)
                  pageSize:
                    type: integer
                    format: int32
                    description: Number of items per page
                  totalPages:
                    type: integer
                    format: int32
                    description: Total number of pages
                  hasNextPage:
                    type: boolean
                    description: Whether there is a next page
                  hasPreviousPage:
                    type: boolean
                    description: Whether there is a previous page
                description: Generic paginated response wrapper
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Boards
    post:
      operationId: Boards_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Boards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoardRequest'
  /api/boards/{boardId}:
    get:
      operationId: Boards_get
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardDetail'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Boards
    patch:
      operationId: Boards_update
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Boards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoardRequest'
    delete:
      operationId: Boards_delete
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Boards
  /api/boards/{boardId}/columns:
    post:
      operationId: Columns_create
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Column'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Columns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateColumnRequest'
  /api/boards/{boardId}/columns/{columnId}:
    patch:
      operationId: Columns_update
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
        - name: columnId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Column'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Columns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateColumnRequest'
    delete:
      operationId: Columns_delete
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: string
        - name: columnId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Columns
  /api/columns/{columnId}/tasks:
    post:
      operationId: Tasks_create
      parameters:
        - name: columnId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskItem'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
  /api/columns/{columnId}/tasks/{taskId}:
    patch:
      operationId: Tasks_update
      parameters:
        - name: columnId
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskItem'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
    delete:
      operationId: Tasks_delete
      parameters:
        - name: columnId
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Tasks
  /api/columns/{columnId}/tasks/{taskId}/move:
    patch:
      operationId: Tasks_move
      parameters:
        - name: columnId
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskItem'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveTaskRequest'
  /api/users/search:
    get:
      operationId: Users_search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSearchItem'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Users
security:
  - {}
  - ApiKeyAuth: []
components:
  schemas:
    AdminStatsResponse:
      type: object
      required:
        - totalUsers
        - activeUsers
        - adminCount
        - totalBoards
        - recentUsers
      properties:
        totalUsers:
          type: integer
          format: int32
        activeUsers:
          type: integer
          format: int32
        adminCount:
          type: integer
          format: int32
        totalBoards:
          type: integer
          format: int32
        recentUsers:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserListItem'
    AdminUserListItem:
      type: object
      required:
        - id
        - email
        - displayName
        - role
        - isActive
        - createdAt
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
    Board:
      type: object
      required:
        - id
        - title
        - ownerId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BoardDetail:
      type: object
      required:
        - id
        - title
        - ownerId
        - createdAt
        - updatedAt
        - columns
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        columns:
          type: array
          items:
            $ref: '#/components/schemas/Column'
    Column:
      type: object
      required:
        - id
        - title
        - position
        - boardId
        - tasks
      properties:
        id:
          type: string
        title:
          type: string
        position:
          type: integer
          format: int32
        boardId:
          type: string
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskItem'
    CreateBoardRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
    CreateColumnRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
    CreateTaskRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        assigneeId:
          type: string
        priority:
          type: string
        tags:
          type: array
          items:
            type: string
        dueDate:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      description: Standard error response returned on failures
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
    MoveTaskRequest:
      type: object
      required:
        - targetColumnId
        - position
      properties:
        targetColumnId:
          type: string
        position:
          type: integer
          format: int32
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - displayName
      properties:
        email:
          type: string
        password:
          type: string
        displayName:
          type: string
    TaskItem:
      type: object
      required:
        - id
        - title
        - position
        - columnId
        - priority
        - tags
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        position:
          type: integer
          format: int32
        columnId:
          type: string
        assigneeId:
          type: string
        priority:
          type: string
        tags:
          type: array
          items:
            type: string
        dueDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateBoardRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
    UpdateColumnRequest:
      type: object
      properties:
        title:
          type: string
        position:
          type: integer
          format: int32
    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        currentPassword:
          type: string
        newPassword:
          type: string
        avatarUrl:
          type: string
    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        assigneeId:
          type: string
        priority:
          type: string
        tags:
          type: array
          items:
            type: string
        dueDate:
          type: string
          format: date-time
    UpdateUserRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
    UpdateUserStatusRequest:
      type: object
      required:
        - isActive
      properties:
        isActive:
          type: boolean
    UserResponse:
      type: object
      required:
        - id
        - email
        - displayName
        - role
        - createdAt
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
        avatarUrl:
          type: string
        createdAt:
          type: string
          format: date-time
    UserSearchItem:
      type: object
      required:
        - id
        - displayName
        - email
      properties:
        id:
          type: string
        displayName:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: cookie
      name: session
servers:
  - url: http://localhost:5010
    description: Development server
    variables: {}
